<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源库 - Termux Nginx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(240, 147, 251, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
            text-decoration: none;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 25px rgba(102, 126, 234, 0.4),
                0 4px 10px rgba(118, 75, 162, 0.3),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 10px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 15px 40px rgba(102, 126, 234, 0.6),
                0 8px 20px rgba(118, 75, 162, 0.4),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 10px rgba(255, 255, 255, 0.3);
        }

        .hero {
            padding: 150px 0 80px;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(102, 126, 234, 0.3);
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 20px;
            opacity: 0.9;
        }

        .categories {
            padding: 20px 0 60px;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 15px 35px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.05);
        }

        .category-tab:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 15px 45px rgba(0, 0, 0, 0.4),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.08);
        }

        .category-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 
                0 10px 30px rgba(102, 126, 234, 0.4),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 10px rgba(255, 255, 255, 0.2);
        }

        .category-tab .icon {
            margin-right: 8px;
        }

        .resources {
            padding: 0 0 100px;
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #e0e0e0;
        }

        .section-desc {
            text-align: center;
            font-size: 16px;
            color: #a0a0a0;
            margin-bottom: 50px;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .resource-card {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.4),
                0 5px 20px rgba(102, 126, 234, 0.1),
                inset 0 -2px 10px rgba(0, 0, 0, 0.3),
                inset 0 2px 10px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }

        .resource-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .resource-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 15px 35px rgba(102, 126, 234, 0.2),
                inset 0 -2px 10px rgba(0, 0, 0, 0.3),
                inset 0 2px 10px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(102, 126, 234, 0.4);
        }

        .resource-card:hover::before {
            opacity: 1;
        }

        .resource-icon {
            font-size: 48px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5));
        }

        .resource-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        .resource-card .filename {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
            margin-bottom: 15px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            font-family: 'Courier New', monospace;
        }

        .resource-card .size-info {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(67, 233, 123, 0.15);
            border-radius: 12px;
            font-size: 11px;
            color: #43e97b;
            margin-bottom: 10px;
            border: 1px solid rgba(67, 233, 123, 0.3);
        }

        .empty-library {
            background: linear-gradient(145deg, #2a0a0a 0%, #1a0505 100%);
            padding: 60px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(255, 0, 0, 0.3),
                0 10px 30px rgba(255, 0, 0, 0.2),
                inset 0 -3px 15px rgba(0, 0, 0, 0.5),
                inset 0 3px 15px rgba(255, 100, 100, 0.1);
            border: 2px solid rgba(255, 50, 50, 0.4);
            animation: emptyPulse 2s ease-in-out infinite;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        @keyframes emptyPulse {
            0%, 100% {
                transform: translateY(0) rotateX(0deg) rotateY(0deg);
                box-shadow: 
                    0 20px 60px rgba(255, 0, 0, 0.3),
                    0 10px 30px rgba(255, 0, 0, 0.2),
                    inset 0 -3px 15px rgba(0, 0, 0, 0.5),
                    inset 0 3px 15px rgba(255, 100, 100, 0.1);
            }
            50% {
                transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
                box-shadow: 
                    0 30px 80px rgba(255, 0, 0, 0.5),
                    0 15px 40px rgba(255, 0, 0, 0.3),
                    inset 0 -3px 15px rgba(0, 0, 0, 0.5),
                    inset 0 3px 15px rgba(255, 100, 100, 0.2);
            }
        }

        .empty-library .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 50, 50, 0.8));
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-15px) scale(1.1);
            }
        }

        .empty-library h3 {
            font-size: 32px;
            color: #ff6b6b;
            margin-bottom: 15px;
            text-shadow: 
                0 0 20px rgba(255, 50, 50, 0.8),
                0 0 40px rgba(255, 0, 0, 0.4);
            font-weight: 700;
        }

        .empty-library p {
            font-size: 16px;
            color: #ff8787;
            opacity: 0.8;
        }

        .resource-card p {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 25px rgba(102, 126, 234, 0.4),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 10px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            border: none;
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 15px 40px rgba(102, 126, 234, 0.6),
                inset 0 -3px 10px rgba(0, 0, 0, 0.2),
                inset 0 3px 10px rgba(255, 255, 255, 0.3);
        }

        .preview-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.2),
                inset 0 -2px 10px rgba(0, 0, 0, 0.2),
                inset 0 2px 10px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        .preview-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.08) 100%);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-content {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 24px;
            max-width: 900px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.5),
                0 15px 35px rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .preview-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header h3 {
            font-size: 20px;
            color: #e0e0e0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            color: #667eea;
        }

        .preview-body {
            padding: 30px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }

        .preview-body pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #00ff88;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        footer {
            background: linear-gradient(145deg, #000000 0%, #0a0a0a 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        footer p {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }

            .resource-grid {
                grid-template-columns: 1fr;
            }

            .category-tabs {
                gap: 10px;
            }

            .category-tab {
                padding: 12px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Termux Nginx</a>
                <a href="index.html" class="back-btn">← 返回首页</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>资源库</h1>
            <p>探索我们精心整理的Termux和Nginx相关资源</p>
        </div>
    </section>

    <section class="categories">
        <div class="container">
            <div class="category-tabs" id="categoryTabs"></div>
        </div>
    </section>

    <section class="resources" id="resourcesSection">
        <div class="container">
            <h2 class="section-title" id="categoryTitle"></h2>
            <p class="section-desc" id="categoryDesc"></p>
            <div class="resource-grid" id="resourceGrid"></div>
        </div>
    </section>

    <div class="preview-modal" id="previewModal">
        <div class="preview-content">
            <div class="preview-header">
                <h3 id="previewTitle">文件预览</h3>
                <button class="close-btn" onclick="closePreview()">&times;</button>
            </div>
            <div class="preview-body">
                <pre id="previewContent"></pre>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2024 Termux Nginx - 让Web服务触手可及</p>
        </div>
    </footer>

    <script>
        let currentCategory = 0;
        let libraryData = null;
        
        function getApiBase() {
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            const port = window.location.port;
            
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return `${protocol}//${hostname}:3000/api`;
            }
            
            return `${protocol}//${hostname}:${port}/api`;
        }
        
        const API_BASE = getApiBase();

        async function init() {
            try {
                const response = await fetch(`${API_BASE}/library`);
                const result = await response.json();
                
                if (result.success) {
                    libraryData = result.data;
                    renderCategoryTabs();
                    showCategory(0);
                } else {
                    console.error('获取库数据失败:', result.error);
                    fallbackToStaticConfig();
                }
            } catch (error) {
                console.error('API请求失败，使用静态配置:', error);
                fallbackToStaticConfig();
            }
        }

        function fallbackToStaticConfig() {
            const script = document.createElement('script');
            script.src = 'library/library-config.js';
            script.onload = () => {
                libraryData = LibraryConfig;
                renderCategoryTabs();
                showCategory(0);
            };
            document.head.appendChild(script);
        }

        function renderCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            tabsContainer.innerHTML = libraryData.categories.map((cat, index) => `
                <button class="category-tab ${index === 0 ? 'active' : ''}" onclick="showCategory(${index})">
                    <span class="icon">${cat.icon}</span>
                    ${cat.name}
                </button>
            `).join('');
        }

        async function showCategory(index) {
            currentCategory = index;
            const category = libraryData.categories[index];
            
            document.querySelectorAll('.category-tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
            });

            document.getElementById('categoryTitle').textContent = category.name;
            document.getElementById('categoryDesc').textContent = category.description;

            const grid = document.getElementById('resourceGrid');
            
            if (category.isEmpty || category.files.length === 0) {
                grid.innerHTML = `
                    <div class="empty-library">
                        <div class="empty-icon">📁</div>
                        <h3>空库</h3>
                        <p>该库暂无文件内容</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = category.files.map((file, fileIndex) => {
                const isBinary = file.type === 'binary';
                const sizeInfo = file.size ? `<span class="size-info">大小: ${file.size}</span>` : '';
                return `
                <div class="resource-card">
                    <div class="resource-icon">${category.icon}</div>
                    <span class="filename">${file.name}</span>
                    <h3>${file.name}</h3>
                    <p>${file.type === 'binary' ? '二进制文件' : '文本文件'}</p>
                    ${sizeInfo}
                    <div class="btn-group">
                        <button class="download-btn" onclick="downloadFile(${index}, ${fileIndex})">下载文件</button>
                        ${!isBinary ? `<button class="preview-btn" onclick="previewFile(${index}, ${fileIndex})">预览</button>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        async function downloadFile(categoryIndex, fileIndex) {
            const category = libraryData.categories[categoryIndex];
            const file = category.files[fileIndex];
            
            try {
                const response = await fetch(`${API_BASE}/file/${category.id}/${file.name}`);
                
                if (file.type === 'binary') {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } else {
                    const result = await response.json();
                    if (result.success) {
                        const blob = new Blob([result.data.content], { type: 'text/plain' });
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = file.name;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }
                }
            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败，请检查API服务是否运行');
            }
        }

        async function previewFile(categoryIndex, fileIndex) {
            const category = libraryData.categories[categoryIndex];
            const file = category.files[fileIndex];
            
            if (file.type === 'binary') {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/file/${category.id}/${file.name}`);
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('previewTitle').textContent = file.name;
                    document.getElementById('previewContent').textContent = result.data.content;
                    document.getElementById('previewModal').classList.add('active');
                }
            } catch (error) {
                console.error('预览失败:', error);
                alert('预览失败，请检查API服务是否运行');
            }
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        document.getElementById('previewModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePreview();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePreview();
            }
        });

        init();
    </script>
</body>
</html>
